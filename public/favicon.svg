<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- subtle ring -->
  <rect x="1" y="1" width="29" height="29" rx="6" fill="none" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1"/>
  <!-- lightning bolt -->
  <g transform="translate(0,0) scale(0.32)" filter="url(#glow)">
    <path d="M 56 8 L 22 52 L 44 52 L 38 92 L 78 44 L 54 44 Z" fill="url(#bolt)"/>
  </g>
</svg>